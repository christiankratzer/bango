<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Bango — Japanese Numbers Trainer</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <h1>番号 <span class="flag" aria-hidden="true">🇯🇵</span><span class="subtitle">bango</span></h1>
    </header>

    <div id="voice-warning" class="warning hidden">
      No Japanese voice found on this device. Speech may sound wrong or be missing entirely.
    </div>

    <section id="setup-screen" class="screen">
      <form id="setup-form">
        <label>
          <span>Mode</span>
          <select id="mode-select">
            <option value="digits">Digit by digit (phone-number style)</option>
            <option value="full">Full number (price style)</option>
            <option value="phone">Phone number (XX-XXXX-XXXX)</option>
            <option value="price">Price (X円)</option>
            <option value="time">Time (X時X分)</option>
            <option value="date">Date (X月X日)</option>
            <option value="year">Year (X年)</option>
            <option value="floor">Floor (X階)</option>
            <option value="counter">Counter (X個/人/枚/本)</option>
            <option value="months">Months (1月–12月)</option>
            <option value="weekdays">Weekdays (日月火水木金土)</option>
          </select>
        </label>
        <label>
          <span>How many in a round</span>
          <input type="number" id="sequence-length" min="1" max="50" value="10" inputmode="numeric">
        </label>
        <label id="digit-count-row">
          <span>Digits per number</span>
          <input type="number" id="digit-count" min="1" max="12" value="4" inputmode="numeric">
        </label>
        <label>
          <span>Voice</span>
          <select id="voice-select"></select>
        </label>
        <label>
          <span>Speech speed: <output id="rate-out">0.9</output>×</span>
          <input type="range" id="rate" min="0.6" max="1.2" step="0.05" value="0.9">
        </label>
        <button type="submit" id="start-btn">Start</button>
      </form>
    </section>

    <section id="trainer-screen" class="screen hidden">
      <div class="progress">
        <span id="progress-text">0 / 0</span>
      </div>
      <button type="button" id="replay-btn" class="replay">▶ Replay</button>
      <form id="answer-form" autocomplete="off">
        <input type="tel" id="answer-input" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
        <button type="submit">Submit</button>
      </form>
      <div id="weekday-input" class="weekday-grid hidden">
        <button type="button" class="day-btn" data-day="0"><span class="kanji">日</span><span class="romaji">Sun</span></button>
        <button type="button" class="day-btn" data-day="1"><span class="kanji">月</span><span class="romaji">Mon</span></button>
        <button type="button" class="day-btn" data-day="2"><span class="kanji">火</span><span class="romaji">Tue</span></button>
        <button type="button" class="day-btn" data-day="3"><span class="kanji">水</span><span class="romaji">Wed</span></button>
        <button type="button" class="day-btn" data-day="4"><span class="kanji">木</span><span class="romaji">Thu</span></button>
        <button type="button" class="day-btn" data-day="5"><span class="kanji">金</span><span class="romaji">Fri</span></button>
        <button type="button" class="day-btn" data-day="6"><span class="kanji">土</span><span class="romaji">Sat</span></button>
      </div>
      <div id="feedback" class="feedback"></div>
      <button type="button" id="quit-btn" class="quit">End session</button>
    </section>

    <section id="done-screen" class="screen hidden">
      <h2 id="done-heading">Done!</h2>
      <p id="stats"></p>
      <ul id="summary-list" class="summary-list"></ul>
      <button type="button" id="again-btn">Again</button>
    </section>

    <footer class="site-footer">
      <a href="https://github.com/christiankratzer/bango" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
